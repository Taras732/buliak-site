services:
  buliak-db:
    image: mariadb:11
    container_name: buliak-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: buliak
      MYSQL_USER: buliak
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT}
    volumes:
      - buliak_db:/var/lib/mysql
    networks: [internal]
  buliak-wp:
    image: wordpress:latest
    container_name: buliak-wp
    restart: unless-stopped
    depends_on: [buliak-db]
    environment:
      WORDPRESS_DB_HOST: buliak-db
      WORDPRESS_DB_NAME: buliak
      WORDPRESS_DB_USER: buliak
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
    volumes:
      - buliak_wp:/var/www/html
    networks: [internal]
  caddy:
    image: caddy:2-alpine
    container_name: buliak-caddy
    restart: unless-stopped
    depends_on: [buliak-wp]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]
volumes:
  buliak_db:
  buliak_wp:
  caddy_data:
  caddy_config:
networks:
  internal:
